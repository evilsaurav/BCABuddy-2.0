name: Deploy BCABuddy API to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -t "${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:latest" -f Dockerfile .
          docker push "${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:latest"

      - name: Deploy Backend to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'bcabuddy-api' 
          images: '${{ secrets.REGISTRY_LOGIN_SERVER }}/backend:latest'